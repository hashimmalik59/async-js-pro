<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>

<body>
    <header class="shadow-lg px-10 py-5 flex justify-between items-center">
        <h1 class="text-3xl"><span class="text-blue-600 font-bold">Hash</span> <span>Store</span></h1>
        <div class="flex gap-2">
            <input class="border rounded px-3 py-1" type="text" placeholder="e.g: Item">
            <button class="border rounded px-2">Search</button>
        </div>
        <select class="border rounded py-1 px-2">
            <option value="all">All</option>
            <option value="low to high">Low to High</option>
            <option value="high to low">High to Low</option>
        </select>
    </header>
    <main class="flex flex-wrap gap-2"></main>
    <script src="app.js"></script>
</body>

</html>
