<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <section class="border rounded flex flex-col justify-center items-center gap-5 px-10 py-5">
        <h1 class="text-3xl font-bold">Github User Finder</h1>
        <div>
            <input type="text" placeholder="Enter your username" class="border border-gray-300 rounded px-2 py-1">
            <button class="border border-gray-300 rounded px-2 py-1">Search</button>
        </div>
    </section>
    <script src="app.js"></script>
</body>

</html>
