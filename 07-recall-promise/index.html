<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        font-family: Poppins, sans-serif;
        box-sizing: border-box;
    }

    html,
    body {
        height: 100%;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 10px;
    }

    .error-message {
        color: red;
        font-weight: 900;
    }

    .hide {
        display: none;
    }
</style>

<body>
    <input type="text" placeholder="Username">
    <button>Search</button>
    <div>
        <span class="error-message hide">Invalid Username</span>
    </div>
    <script src="app.js"></script>
</body>

</html>
